name: Security

on:
    push:
        branches: [main]
    pull_request:
    schedule:
        - cron: "0 6 * * 2" # Tuesdays 06:00 UTC

permissions:
    contents: read

jobs:
    codeql:
        name: CodeQL
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            actions: read
            contents: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: [python]
        steps:
            - name: Check out
              uses: actions/checkout@v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: ${{ matrix.language }}
                  queries: security-extended

            - name: Analyze
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:${{ matrix.language }}"

    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Check out
              uses: actions/checkout@v6

            - name: Set up the environment
              uses: ./.github/actions/setup-uv-env
              with:
                  groups: dev

            - name: Run pip-audit against the synced environment
              # --skip-editable: ignore the locally-installed aimnet package (not on PyPI)
              # No --strict: --strict treats the editable skip as an error
              run: uv run --with pip-audit pip-audit --skip-editable --progress-spinner off
