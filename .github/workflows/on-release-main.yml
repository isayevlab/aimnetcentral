name: release-main

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Check out
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Fetch all history and tags for hatch-vcs
                  ref: ${{ github.event.release.tag_name }}

            - name: Set up the environment
              uses: ./.github/actions/setup-uv-env

            - name: Verify release tag checkout
              run: |
                  set -euo pipefail
                  test "$(git describe --tags --exact-match)" = "${{ github.event.release.tag_name }}"

            - name: Build and publish
              run: |
                  uv build
                  python - <<'PY'
                  import os
                  import re

                  tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
                  files = os.listdir("dist")
                  pattern = re.compile(rf"aimnet-{re.escape(tag)}(?:\.|-)")
                  if not any(pattern.match(name) for name in files):
                      raise SystemExit(f"dist artifacts {files!r} do not match release tag {tag!r}")
                  PY
                  uv publish --token ${{ secrets.PYPI_TOKEN }}

    deploy-docs:
        needs: publish
        runs-on: ubuntu-latest
        steps:
            - name: Check out
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Fetch all history and tags for hatch-vcs
                  ref: ${{ github.event.release.tag_name }}

            - name: Set up the environment
              uses: ./.github/actions/setup-uv-env
              with:
                  groups: "dev,docs"

            - name: Deploy documentation
              run: uv run mkdocs gh-deploy --force
